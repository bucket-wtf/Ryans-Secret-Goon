    text-align: center;
    position: fixed;
    bottom: 2.5rem;
    top: auto;
    left: 0;
    right: 0;
    z-index: 10;
    pointer-events: none;
    background: linear-gradient(90deg, #888 0%, #fff 40%, #fff 60%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 18px rgba(255,255,255,0.35));
  }

  #goon-btn {
    position: relative;
    background: #000;
    color: #fff;
    border: 1.5px solid #333;
    padding: 1.1rem 3.2rem;
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    overflow: hidden;
    outline: none;
    border-radius: 0;
    transition: border-color 0.2s;
    z-index: 10;
  }

  #goon-btn span {
    position: relative;
    z-index: 2;
  }

  #goon-btn .stripes {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: repeating-linear-gradient(
      110deg,
      rgba(255,255,255,0) 0px,
      rgba(255,255,255,0) 10px,
      rgba(255,255,255,0.18) 10px,
      rgba(255,255,255,0.18) 20px,
      rgba(0,0,0,0.3) 20px,
      rgba(0,0,0,0.3) 30px
    );
    background-size: 42px 100%;
    opacity: 0;
    transition: opacity 0.15s;
    animation: none;
  }

  #goon-btn:hover .stripes {
    opacity: 1;
    animation: stripe-scroll 0.5s linear infinite;
  }

  #goon-btn:hover {
    border-color: #666;
  }

  @keyframes stripe-scroll {
    from { background-position: 0 0; }
    to { background-position: 42px 0; }
  }

  #splat-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<div id="main-title">Ryan Djunaidi's Gooning Simulator</div>
<div id="tagline">Click Ryan's Goon to Get Started!</div>

<button id="goon-btn">
  <div class="stripes"></div>
  <span>Ryan's Goon</span>
</button>

<canvas id="splat-canvas"></canvas>

<script>
  const btn = document.getElementById('goon-btn');
  const canvas = document.getElementById('splat-canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  let activeSplats = [];
  let rafId = null;

  function rand(a, b) { return a + Math.random() * (b - a); }

  function makeSplat() {
    const cx = rand(canvas.width * 0.2, canvas.width * 0.8);
    const cy = rand(canvas.height * 0.2, canvas.height * 0.8);
    const blobCount = Math.floor(rand(8, 15));
    const blobs = [];
    const scale = rand(0.6, 1.2);

    for (let i = 0; i < blobCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = rand(0, rand(10, 55)) * scale;
      blobs.push({
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        r: rand(8, 28) * scale,
        alpha: rand(0.75, 1)
      });
    }

    const drips = [];
    for (const blob of blobs) {
      if (Math.random() < 0.45) {
        drips.push({
          x: blob.x + rand(-blob.r * 0.3, blob.r * 0.3),
          y: blob.y + blob.r * 0.6,
          w: rand(3, 9) * scale,
          h: 0,
          maxH: rand(20, 80) * scale,
          speed: rand(1, 3),
          alpha: blob.alpha
        });
      }
    }

    return { blobs, drips, born: Date.now(), duration: 10000 };
  }

  function drawAll(now) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    activeSplats = activeSplats.filter(s => (now - s.born) < s.duration);

    for (const splat of activeSplats) {
      const elapsed = now - splat.born;
      const progress = elapsed / splat.duration;
      const fadeStart = 0.75;
      const globalAlpha = progress > fadeStart
        ? 1 - (progress - fadeStart) / (1 - fadeStart)
        : 1;

      for (const blob of splat.blobs) {
        ctx.save();
        ctx.globalAlpha = blob.alpha * globalAlpha;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(blob.x, blob.y, blob.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      for (const drip of splat.drips) {
        if (drip.h < drip.maxH) drip.h = Math.min(drip.h + drip.speed, drip.maxH);
        const rx = drip.w / 2;
        ctx.save();
        ctx.globalAlpha = drip.alpha * globalAlpha;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(drip.x - rx, drip.y, drip.w, drip.h);
        ctx.beginPath();
        ctx.ellipse(drip.x, drip.y + drip.h, rx, rx * 1.2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    if (activeSplats.length > 0) {
      rafId = requestAnimationFrame(t => drawAll(t));
    } else {
      rafId = null;
    }
  }

  btn.addEventListener('click', () => {
    activeSplats.push(makeSplat());
    if (!rafId) {
      rafId = requestAnimationFrame(t => drawAll(t));
    }
  });
</script>
</body>
</html>
